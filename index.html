<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="dashboard-grid">

    <!-- Greeting Widget -->
    <section class="widget" id="widget-greeting">
      <h2 id="greeting-message">Good Morning</h2>
      <p id="greeting-time">00:00</p>
      <p id="greeting-date">Monday, 01 January 2025</p>
    </section>

    <!-- Focus Timer Widget -->
    <section class="widget" id="widget-timer">
      <h2>Focus Timer</h2>
      <p id="timer-display">25:00</p>
      <div class="timer-controls">
        <button id="timer-start">Start</button>
        <button id="timer-stop">Stop</button>
        <button id="timer-reset">Reset</button>
      </div>
    </section>

    <!-- To-Do List Widget -->
    <section class="widget" id="widget-todo">
      <h2>To-Do List</h2>
      <form id="todo-form">
        <input 
        type="text" id="todo-input" 
        placeholder="Add a new task…" 
        maxlength="200" />
        <button type="submit">Add</button>
      </form>
      <p 
      id="todo-error" 
      class="validation-error" 
      aria-live="polite"
      ></p>
      <ul id="todo-list"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section class="widget" id="widget-links">
      <h2>Quick Links</h2>
      <form id="links-form">
        <input 
        type="text" id="links-label" 
        placeholder="Label (max 50 chars)" 
        maxlength="50" 
        />
        <input 
        type="text" 
        id="links-url" 
        placeholder="URL" 
        maxlength="2048" 
        />
        <button type="submit">Add</button>
      </form>
      <p id="links-error" class="validation-error" aria-live="polite"></p>
      <div id="links-list"></div>
    </section>
    
    <!-- Settings Widget -->
    <section class="widget" id="widget-settings">
    <h2>Settings</h2>

    <!-- Custom Name -->
    <div class="settings-group">
      <label>Your Name</label>

      <input
        type="text"
        id="custom-name"
        placeholder="Enter your name"
        maxlength="30"
      />
    </div>

    <!-- Pomodoro Time -->
    <div class="settings-group">
      <label>Pomodoro Minutes</label>
        <input
        type="number"
        id="pomodoro-time"
        min="1"
        max="120"
        value="25"
      />
    </div>

    <!-- Theme -->
    <div class="settings-group">
      <label>Theme</label>

      <button id="theme-toggle">
        Toggle Dark Mode
      </button>
    </div>

    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
